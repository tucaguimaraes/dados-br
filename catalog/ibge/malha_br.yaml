source: "IBGE"
category: geografia
description: |
  Malhas territoriais digitais do Brasil disponibilizadas pelo IBGE para o
  ano de referência 2024. Inclui polígonos de todos os municípios brasileiros,
  limites estaduais, regiões geográficas imediatas e intermediárias e limites
  do país. Formato Shapefile comprimido em ZIP.
