notes: |
  PeNSE é amostral, com representatividade para capitais e regiões.
  Aplicada em escolas públicas e privadas. A edição 2019 incluiu Ensino Médio
  pela primeira vez. Variáveis de interesse para cruzamento com Censo Escolar:
  saúde mental dos estudantes, bullying, consumo de álcool e tabaco, atividade física.
