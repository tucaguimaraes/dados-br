id: pense
name: "PeNSE – Pesquisa Nacional de Saúde do Escolar"
source: "IBGE/MS"
category: saude_educacao
description: |
  Pesquisa do IBGE em parceria com o Ministério da Saúde que investiga as
  condições de saúde e fatores de risco dos escolares brasileiros do 6º ao 9º ano
  (e Ensino Médio na edição 2019). Abrange: alimentação, atividade física, uso de
  álcool e drogas, violência, saúde sexual e reprodutiva, saúde mental, higiene,
  saneamento e acesso a serviços de saúde. Disponível em 2009, 2012, 2015 e 2019.
