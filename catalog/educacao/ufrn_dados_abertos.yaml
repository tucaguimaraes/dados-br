notes: |
  O portal dados.ufrn.br usa CKAN e tem mais de 60 conjuntos de dados.
  A UFRN é referência nacional em dados abertos acadêmicos — os dados são
  ricos e bem documentados. Outros datasets relevantes:
    - Cotas e ações afirmativas
    - Bolsas de permanência
    - Estrutura curricular por curso
    - Calendário acadêmico e feriados
  O SIGAA/UFRN é adotado por mais de 60 IFEs — dados similares disponíveis
  em: UFPA, UFPB, UFERSA, UFC, UFCA, entre outras.
  Para comparação entre universidades use o Censo da Educação Superior (INEP).
