id: ufrn_dados_abertos
name: "UFRN – Dados Abertos da Universidade Federal do Rio Grande do Norte"
source: "UFRN"
category: educacao
description: |
  Dados abertos da UFRN, uma das universidades federais com maior tradição
  em abertura de dados no Brasil. Disponibiliza dados de discentes, docentes,
  técnicos administrativos, projetos de pesquisa e extensão, cotas,
  evasão, desempenho acadêmico e dados financeiros. O portal SIGAA/SIGRH
  da UFRN é referência nacional de sistema acadêmico de código aberto,
  adotado por dezenas de IFEs brasileiras.
tags:
