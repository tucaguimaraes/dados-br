  - discentes
  - docentes
  - pesquisa
  - extensao
  - dados_abertos_academicos
  - federal
license: "Dados Abertos UFRN (CC BY)"
homepage: "https://dados.ufrn.br"
url_type: static_list
file_format: csv
files:
