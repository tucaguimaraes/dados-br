description: |
  Dados de saúde do estado de Goiás disponibilizados pelo Portal de Dados
  Abertos do Governo de Goiás. Inclui dados sobre COVID-19 (casos, óbitos,
  testes), solicitações de internação por arbovirose, mortalidade infantil
  e expectativa de vida por município.
