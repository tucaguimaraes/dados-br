description: |
  Dados educacionais do estado de Goiás disponibilizados pelo Portal de
  Dados Abertos do Governo de Goiás. Inclui: resultados IDEGO/SAEGO,
  cadastro de professores por escola, matrículas por etapa, escolas
  conveniadas, repasse de merenda escolar, transporte escolar, cursos
  de graduação da UEG, emendas impositivas e convênios SEDUC.
  Dados de 2025 em formato CSV.
