source: "AGR-GO / dadosabertos.go.gov.br"
category: saneamento
description: |
  Dados de saneamento básico do estado de Goiás disponibilizados pelo
  Portal de Dados Abertos do Governo de Goiás. Inclui relatórios de
  fiscalização, convênios de delegação de regulação, autos de infração
  e microrregiões de saneamento básico da AGR-GO (Agência Goiana de
  Regulação, Controle e Fiscalização de Serviços Públicos).
