notes: |
  Série histórica completa: 2005, 2007, 2009, 2011, 2013, 2015, 2017, 2019,
  2021 e 2023 (bienal). Cada edição disponibiliza três etapas:
    - Anos Iniciais (1º–5º ano do Ensino Fundamental)
    - Anos Finais  (6º–9º ano do Ensino Fundamental)
    - Ensino Médio
  Este catálogo baixa os resultados por Município (30 arquivos, ~62 MB).
  Para resultados por Escola, substitua "municipios" por "escolas" nas URLs.
  Para resultados por Estado/Região, substitua por "brasil_regioes_ufs".
  Os arquivos contêm planilhas Excel (.xlsx) com metas e resultados observados
  para redes pública (federal, estadual, municipal) e total (pública + privada).
