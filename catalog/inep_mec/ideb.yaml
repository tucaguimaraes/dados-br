id: ideb
name: "IDEB – Índice de Desenvolvimento da Educação Básica"
source: "INEP/MEC"
category: educacao
description: |
  Resultados do IDEB (Índice de Desenvolvimento da Educação Básica), criado
  pelo INEP em 2007. Combina fluxo escolar (taxa de aprovação) e desempenho
  nas avaliações do SAEB/Prova Brasil. Calculado a cada dois anos para as
  redes pública e privada, desagregado por escola, município, estado e Brasil.
  Cobre três etapas: Anos Iniciais (1º–5º ano), Anos Finais (6º–9º ano) e
  Ensino Médio.
