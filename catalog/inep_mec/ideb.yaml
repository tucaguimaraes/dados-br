notes: |
  O IDEB é calculado bienalmente (anos ímpares: 2005, 2007, ..., 2021, 2023).
  Este catálogo disponibiliza a edição de 2021 (última com URLs estáveis
  verificadas). Para edições anteriores, substitua o ano na URL:
    https://download.inep.gov.br/educacao_basica/portal_ideb/planilhas_para_download/{year}/divulgacao_anos_iniciais_municipios_{year}.zip
  Edições disponíveis: 2005, 2007, 2009, 2011, 2013, 2015, 2017, 2019, 2021.
  Os arquivos contêm planilhas Excel (.xlsx) com metas e resultados observados
  para as redes pública (federal, estadual, municipal) e total (pública + privada).
  Correlaciona-se diretamente com o SAEB e o Censo Escolar.
