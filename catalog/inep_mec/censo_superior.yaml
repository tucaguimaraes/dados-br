id: censo_superior
name: "Censo da Educação Superior"
source: "INEP/MEC"
category: educacao
description: |
  Microdados do Censo da Educação Superior (CES). Levantamento anual sobre
  cursos de graduação presencial e a distância, IES (Instituições de Ensino
  Superior), alunos matriculados, concluintes, ingressantes e docentes.
  Permite calcular indicadores como taxa de conclusão, fluxo escolar e
  perfil dos estudantes de ensino superior.
tags:
  - censo_superior
  - inep
  - ensino_superior
  - ies
  - graduacao
  - microdados
license: "Dados Abertos MEC"
homepage: "https://www.gov.br/inep/pt-br/acesso-a-informacao/dados-abertos/microdados/censo-da-educacao-superior"
url_type: pattern
file_format: zip
years:
  start: 2000
  end: 2023
url_pattern: "https://download.inep.gov.br/microdados/microdados_censo_da_educacao_superior_{year}.zip"
year_exceptions:
  "2024": null
est_size_mb_per_year: 200
est_extracted_mb_per_year: 700
dest_folder: "inep_mec/censo_superior"
checks:
  - type: file_exists
  - type: zip_valid
  - type: min_size_mb
    value: 30
notes: |
  Disponível de 2000 a 2023. Contém dados de IES, cursos, alunos e docentes.
  A estrutura do dicionário de variáveis pode mudar entre anos.
  Ideal para calcular indicadores CH09 (Taxa de Matrícula ES) e CH10
  (Taxa de Conclusão ES).
