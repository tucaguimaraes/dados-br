id: snis_residuos
name: "SNIS – Diagnóstico de Resíduos Sólidos"
source: "SNIS/MCidades"
category: saneamento
description: |
  Dados do Sistema Nacional de Informações sobre Saneamento (SNIS),
  componente de Resíduos Sólidos. Diagnósticos anuais com informações
  sobre coleta, tratamento e destinação final de resíduos sólidos por
  município, incluindo indicadores de cobertura da coleta de lixo.
  Base para cálculo do indicador CH16 (Cobertura de Saneamento).
