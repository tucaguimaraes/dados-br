id: prefeitura_goiania
name: "Prefeitura de Goiânia – Dados Abertos"
source: "PMG"
category: transparencia
description: |
  Dados abertos da Prefeitura Municipal de Goiânia (PMG). Inclui execução
  orçamentária, contratos, licitações, dados de servidores, receitas e
  despesas municipais, projetos de infraestrutura e dados setoriais de
  saúde e educação da capital goiana. Portal de transparência integrado
  ao sistema BETHA e ao e-SIC municipal.
tags:
  - goiania
  - goias
  - prefeitura
  - municipio
  - orcamento
  - contratos
  - transparencia_municipal
license: "Dados Abertos PMG"
homepage: "https://transparencia.goiania.go.gov.br"
url_type: static_list
file_format: csv
files:
  - url: "https://transparencia.goiania.go.gov.br/api/despesas/download?ano=2023"
    filename: "goiania_despesas_2023.csv"
    description: "Despesas municipais Goiânia 2023"
    est_size_mb: 15
  - url: "https://transparencia.goiania.go.gov.br/api/contratos/download?ano=2023"
    filename: "goiania_contratos_2023.csv"
    description: "Contratos e licitações Goiânia 2023"
    est_size_mb: 5
  - url: "https://transparencia.goiania.go.gov.br/api/servidores/download"
    filename: "goiania_servidores.csv"
    description: "Servidores municipais Goiânia"
    est_size_mb: 3
est_size_mb_total: 23
est_extracted_mb_total: 23
dest_folder: "prefeituras/goiania"
checks:
  - type: file_exists
  - type: csv_readable
  - type: min_size_mb
    value: 0.5
notes: |
  Portal de transparência em https://transparencia.goiania.go.gov.br
  Dados financeiros também acessíveis via SICOM-GO (Tribunal de Contas).
  Para dados de IPTU e cadastro imobiliário consulte a SEFIN Goiânia.
  Goiânia integra o Sistema BETHA de gestão municipal — formato padronizado
  compartilhado com vários municípios goianos.
