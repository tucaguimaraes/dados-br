name: 💡 Sugestão de Funcionalidade
description: Proponha uma nova funcionalidade ou melhoria para o dados-br.
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Obrigado pela sugestão! Descreva o que você gostaria de ver no dados-br.

  - type: textarea
    id: problem
    attributes:
      label: Qual problema você está tentando resolver?
      description: Uma descrição clara e concisa do problema. Ex.: "Fico frustrado quando..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Descreva a solução que você gostaria
      description: Uma descrição clara e concisa do que você quer que aconteça.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Você já tentou alguma alternativa? Descreva.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Área da funcionalidade
      options:
        - CLI (novos comandos ou flags)
        - Catálogo (novos datasets ou atributos)
        - Download (desempenho, retry, formatos)
        - Integridade (verificação, manifests)
        - Indicadores (novos indicadores ou queries)
        - Documentação
        - Outra
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Contexto adicional
      description: Capturas de tela, exemplos de uso, links de referência
    validations:
      required: false
